name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare release keystore
        shell: bash
        env:
          NV_RELEASE_KEYSTORE_BASE64: ${{ secrets.NV_RELEASE_KEYSTORE_BASE64 }}
          NV_RELEASE_STORE_PASSWORD_SECRET: ${{ secrets.NV_RELEASE_STORE_PASSWORD }}
          NV_RELEASE_KEY_ALIAS_SECRET: ${{ secrets.NV_RELEASE_KEY_ALIAS }}
          NV_RELEASE_KEY_PASSWORD_SECRET: ${{ secrets.NV_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$NV_RELEASE_KEYSTORE_BASE64" ]; then
            echo "$NV_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/nv-release.keystore"
            echo "NV_RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/nv-release.keystore" >> "$GITHUB_ENV"
            echo "NV_RELEASE_STORE_PASSWORD=$NV_RELEASE_STORE_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "NV_RELEASE_KEY_ALIAS=$NV_RELEASE_KEY_ALIAS_SECRET" >> "$GITHUB_ENV"
            echo "NV_RELEASE_KEY_PASSWORD=$NV_RELEASE_KEY_PASSWORD_SECRET" >> "$GITHUB_ENV"
          else
            keytool -genkeypair \
              -keystore "$RUNNER_TEMP/nv-debug.keystore" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "NV_RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/nv-debug.keystore" >> "$GITHUB_ENV"
            echo "NV_RELEASE_STORE_PASSWORD=android" >> "$GITHUB_ENV"
            echo "NV_RELEASE_KEY_ALIAS=androiddebugkey" >> "$GITHUB_ENV"
            echo "NV_RELEASE_KEY_PASSWORD=android" >> "$GITHUB_ENV"
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Rename release APK
        shell: bash
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
            "app/build/outputs/apk/release/NegativeViewer-Android-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            Negative Viewer Android v1.0.0 发布。

            版本：${{ github.ref_name }}
            平台：Android

            本版本面向胶片底片翻拍预览与拍摄保存，主要包含：
            - 支持 NORMAL、COLOR、B&W、COLOR+ 四种预览模式
            - COLOR+ 模式支持片基采样、重新采样、重置片基，并显示采样色块与 RGB 数值
            - 支持 Tone 参数调整：Brightness / Contrast / Gamma
            - 支持 RGB 三通道增益调节
            - 支持点击对焦；长按可保持当前对焦/测光区域不自动取消
            - 支持单图保存和原图 + 处理图拼接保存

            说明：
            - Release 附件中的 APK 适用于 Android 设备
            - 长按对焦依赖设备 CameraX 能力，不同设备对连续自动对焦和镜头锁定的支持可能不同
          files: |
            app/build/outputs/apk/release/NegativeViewer-Android-*.apk
